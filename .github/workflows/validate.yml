name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run validate
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m unittest discover -s skills/wxarticle-archive/tests -p 'test_*.py'
      - run: npm ci
        working-directory: workers/wxarticle-archive-api
      - run: npm run typecheck
        working-directory: workers/wxarticle-archive-api
      - run: npm test
        working-directory: workers/wxarticle-archive-api
